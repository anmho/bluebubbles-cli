          in: query
          description: Your BlueBubbles Server password
          schema:
            type: string
          example: "{{password}}"
      responses:
        "200":
          description: Refresh FindMy Devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: string
              example:
                status: 200
                message: Success
                data: Successfully refreshed FindMy devices locations!
      tags:
        - v1
        - iCloud
      description: >-
        Refresh your FindMy Devices locations by using Accessibility to open the
        FindMy app. This endpoint returns the location data after the locations
