  /ap/v1/icloud/account/alias:
    post:
      summary: Modify Active Alias
      parameters:
        - name: password
          in: query
          description: Your BlueBubbles Server password
          schema:
            type: string
          example: "{{password}}"
      responses:
        "200":
          description: Refresh FindMy Friends
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: string
              example:
                status: 200
                message: Success
                data: Successfully refreshed FindMy friends locations!
      tags:
        - v1
        - iCloud
      description: >-
        **Private API Only**


        Change which iCloud address you send iMessages from. If you have
        multiple aliases for your iCloud account setup, you can choose one
        specifically to send messages from. By default, it's your original Apple
        ID.


        If the alias you provide is not a vetted (approved) alias, this call
        will throw an error.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                  format: email
            example:
              alias: jdoe@gmail.com
  /api/v1/server/statistics/media/chat:
    get:
      summary: Get Media Totals Per Chat
      parameters:
        - name: password
          in: query
          description: Your BlueBubbles Server password
          schema:
            type: string
          example: "{{password}}"
        - name: only
          in: query
          description: >-
            (Optional) A parameter telling the API which totals to calculate.
            Must be one of: `video`, `image`, `location` (Default: All)
          schema:
            type: string
      responses:
        "200":
          description: Get Media Totals Per Chat
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        chatGuid:
                          type: string
                        groupName:
                          type: string
                        totals:
                          type: object
                          properties:
                            images:
                              type: integer
                            videos:
                              type: integer
                            locations:
                              type: integer
              example:
                status: 200
                message: Success
                data:
                  - chatGuid: iMessage;+;chatXXXXXXXXXXXXXX
                    groupName: ""
                    totals:
                      images: 84
                      videos: 3
                      locations: 0
                  - chatGuid: iMessage;+;chatYYYYYYYYYYYYYY
                    groupName: ""
                    totals:
                      images: 84
                      videos: 3
                      locations: 0
                  - chatGuid: iMessage;+;chatZZZZZZZZZZZZZZZZ
                    groupName: BlueBubbles is Awesome
                    totals:
                      images: 84
                      videos: 3
                      locations: 0
      tags:
        - v1
        - Server
        - Statistics
      description: Fetches different types of media totals per chat (i.e. videos & images).
  /api/v1/server/statistics/media:
    get:
      summary: Get Media Totals
      parameters:
        - name: password
          in: query
          description: Your BlueBubbles Server password
          schema:
            type: string
          example: "{{password}}"
        - name: only
          in: query
          description: >-
            (Optional) A parameter telling the API which totals to calculate.
            Must be one of: `video`, `image`, `location` (Default: All)
          schema:
            type: string
      responses:
        "200":
          description: Get Media Totals
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      images:
                        type: integer
                      videos:
                        type: integer
                      locations:
                        type: integer
              example:
                status: 200
                message: Success
                data:
                  images: 6773
                  videos: 483
                  locations: 47
      tags:
        - v1
        - Server
        - Statistics
      description: >-
        Fetches different types of media totals for all chats (i.e. videos &
        images).
  /api/v1/server/statistics/totals:
    get:
      summary: Get iMessage Entity Totals
      parameters:
        - name: password
          in: query
          description: Your BlueBubbles Server password
          schema:
            type: string
          example: "{{password}}"
        - name: only
          in: query
          description: >-
            (Optional) A parameter telling the API which totals to calculate.
            Must be one of: `handle`, `message`, `chat`, `attachment` (Default:
            All)
          schema:
            type: string
      responses:
        "200":
          description: Get iMessage Entity Totals
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      handles:
                        type: integer
                      messages:
                        type: integer
                      chats:
                        type: integer
                      attachments:
                        type: integer
              example:
                status: 200
                message: Success
                data:
                  handles: 130
                  messages: 124039
                  chats: 230
                  attachments: 11367
      tags:
        - v1
        - Server
        - Statistics
      description: >-
        Fetches the database totals for the iMessage entities (i.e. handles,
        messages, chats, etc.)
  /api/v1/server/update/check:
    get:
      summary: Check for Server Update
      parameters:
        - name: password
          in: query
          description: Your BlueBubbles Server password
          schema:
            type: string
          example: "{{password}}"
      responses:
        "200":
          description: Check for Server Update
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      available:
                        type: boolean
                      current:
                        type: string
                      metadata:
                        nullable: true
              example:
                status: 200
                message: Success
                data:
                  available: false
                  current: 11.1.1
                  metadata: null
      tags:
        - v1
        - Server
      description: >-
        Check to see if the BlueBubbles Server App has an update available. If
        an update is available, the update metadata will be returned.
  /api/v1/server/update/install:
    post:
      summary: Install Server Update
      parameters:
        - name: password
          in: query
          description: Your BlueBubbles Server password
          schema:
            type: string
          example: "{{password}}"
        - name: wait
          in: query
          description: >-
            (Optional) Waits for the update to complete to return (default:
            false)
          schema:
            type: boolean
          example: "true"
      responses:
        "200":
          description: Check for Server Update
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      available:
                        type: boolean
                      current:
                        type: string
                      metadata:
                        nullable: true
              example:
                status: 200
                message: Success
                data:
                  available: false
                  current: 11.1.1
                  metadata: null
      tags:
        - v1
        - Server
      description: >-
        Installs an update if one is available.


        You may pass a `wait=true` URL parameter to have the endpoint wait until
        the update is complete to return. Otherwise, it will not by default.
  /api/v1/server/alert/read:
