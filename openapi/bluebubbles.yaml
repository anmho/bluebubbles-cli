                  data:
                    type: string
              example:
                status: 200
                message: Success
                data: Successfully fetched FindMy friends locations!
      tags:
        - v1
        - iCloud
      description: >-
        Fetch your FindMy Friends locations. If your macOS version doesn't
        support it, or you've never opened the FindMy app, this endpoint may
