name: Docs Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "website/**"
      - "docs/**"
      - ".github/workflows/docs-preview.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install docs dependencies
        run: npm --prefix website ci

      - name: Build docs
        run: npm --prefix website run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: website/build
          if-no-files-found: error
          retention-days: 7

      - name: Comment preview instructions
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- docs-preview-comment -->';
            const body = [
              marker,
              '✅ Docusaurus preview build is ready.',
              '',
              `1. Open the workflow run: ${process.env.RUN_URL}`,
              '2. Download the `docs-preview` artifact',
              '3. Unzip and open locally (for example `npx serve <unzipped-dir>`)',
              '',
              'This artifact is generated from the PR branch and can be reviewed before merge.',
            ].join('\n');

            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
