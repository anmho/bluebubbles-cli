name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Type Check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Verify CLI Version Matches package.json
        run: |
          cli_version="$(bun dist/index.js --version)"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$cli_version" != "$pkg_version" ]; then
            echo "Version mismatch: cli=$cli_version package=$pkg_version"
            exit 1
          fi
          echo "Version OK: $cli_version"

      - name: Publish To npm
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: npm publish --cache /tmp/npm-cache
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
